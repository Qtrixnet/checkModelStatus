<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Сервис позволяет указать модель в поле для поиска и получить информацию о её доступности к заказу, узнать к какой линейке относиться модель / в каком прайсе её найти, получить ссылку на hikvision.com и рекомедуемую замену, если модель снята с производства." />
  <title>Сервис для проверки доступности оборудования</title>
  <link rel="stylesheet" href="./pages/index.css">
</head>

<body class="page">
  <h1 class="title">Какую модель проверяем на актуальность?</h1>
  <form class="form">
    <fieldset class="form__fieldset">
      <input class="form__input" title="Введите название модели" placeholder="Введите модель, например DS-2CD2023G2-I" required minLength="1"
        type="text">
    </fieldset>
    <span class="form__info form__info_result active"></span>
    <span class="form__info form__info_product active"></span>
    <span class="form__info form__info_category active"></span>
    <span class="form__info form__info_replacement active"></span>
    <details class="form__details">
      <summary title="Развернуть список найденных моделей" class="form__details-title">Посмотреть список</summary>
      <p class="form__details-text"></p>
    </details>
    <a class="form__info form__info_link active" target="_blank" href="#"></a>
    <button class="form__button" type="submit"></button>
  </form>
  <span class="statistics"></span>

  <script type="module" src="./pages/index.js"></script>
</body>

</html>
