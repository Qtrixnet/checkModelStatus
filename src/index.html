<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Сервис позволяет указать модель в поле для поиска и получить информацию о её доступности к заказу, узнать к какой линейке относиться модель / в каком прайсе её найти, получить ссылку на hikvision.com и рекомедуемую замену, если модель снята с производства." />
  <title>Сервис для проверки оборудования</title>
</head>

<body class="page">
  <div class="note">
    <span class="note__title">Что умеет поиск?</span>
    <ul class="note__list">
      <li class="note__list-item">Проверять актуальность моделей по брендам Hikvision / HiLook</li>
      <li class="note__list-item">Предлагать альтернативу снятому с производства оборудованию и аналоги на других брендах</li>
    </ul>
  </div>
  <h1 class="title">Данные загружаются, пожалуйста подождите...</h1>
  <form class="form">
    <fieldset class="form__fieldset">
      <button type="button" class="form__reset" title="Очистить поле ввода">Очистить</button>
      <input class="form__input" title="Введите название модели" placeholder="DS-2CD2023G2-I"
        required minLength="1" type="text">
    </fieldset>
    <span class="form__info form__info_result"></span>
    <span class="form__info form__info_product"></span>
    <span class="form__info form__info_category"></span>
    <span class="form__info form__info_replacement"></span>
    <a class="form__info form__info_link" href="#"></a>
  </form>
  <span class="statistics"></span>

</body>

</html>
